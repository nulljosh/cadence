<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@200;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafafa;
      --bg2: #f2f2f2;
      --text: #111;
      --text-secondary: rgba(0,0,0,0.5);
      --text-tertiary: rgba(0,0,0,0.3);
      --border: rgba(0,0,0,0.09);
      --accent: #111;
      --font: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111;
        --bg2: #1c1c1c;
        --text: #e8e8e8;
        --text-secondary: rgba(232,232,232,0.5);
        --text-tertiary: rgba(232,232,232,0.25);
        --border: rgba(255,255,255,0.09);
        --accent: #e8e8e8;
      }
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      font-weight: 400;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: clamp(3rem, 8vw, 6rem) clamp(1.25rem, 5vw, 3rem) 4rem;
    }

    /* FadeUp */
    .fade-up {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.7s ease-out, transform 0.7s ease-out;
    }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* Header */
    header { margin-bottom: clamp(3rem, 6vw, 5rem); }

    .wordmark {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 200;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1.05;
      margin-bottom: 0.75rem;
    }

    .sub {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .streak-badge {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-tertiary);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px 10px;
    }

    /* Section label */
    .section-label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-tertiary);
      display: block;
      margin-bottom: 1.25rem;
    }

    section { margin-bottom: clamp(2.5rem, 5vw, 4rem); }

    /* Stats row */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--border);
    }

    .stat-cell {
      padding: 1.25rem 0;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding-right: 1.5rem;
      transition: opacity 0.3s ease-out;
    }

    .stat-cell:last-child { border-right: none; }
    .stat-cell:hover { opacity: 0.6; }

    .stat-num {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 200;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .stat-label {
      font-size: 0.6875rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    /* Chart */
    .chart-wrap {
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    canvas { max-height: 160px; }

    /* Heatmap */
    .heatmap-wrap {
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    .heatmap {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }

    .heatmap-cell {
      width: 11px;
      height: 11px;
      border-radius: 2px;
      background: rgba(232,232,232,0.07);
      transition: transform 0.15s var(--spring), opacity 0.15s;
    }

    .heatmap-cell:hover { transform: scale(1.5); opacity: 0.8; }
    .heatmap-cell.l1 { background: rgba(232,232,232,0.15); }
    .heatmap-cell.l2 { background: rgba(232,232,232,0.35); }
    .heatmap-cell.l3 { background: rgba(232,232,232,0.6); }
    .heatmap-cell.l4 { background: rgba(232,232,232,0.9); }

    /* Project list */
    .proj-list {
      list-style: none;
      border-top: 1px solid var(--border);
    }

    .proj-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.875rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9375rem;
      color: var(--text-secondary);
      transition: opacity 0.3s ease-out, transform 0.2s var(--spring);
    }

    .proj-row:hover { opacity: 0.6; transform: translateX(4px); }

    .proj-name {
      color: var(--text);
      font-weight: 500;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .proj-meta {
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      flex-shrink: 0;
      font-size: 0.875rem;
    }

    .proj-commits {
      color: var(--text);
      font-weight: 500;
      min-width: 3ch;
      text-align: right;
    }

    .proj-ago { color: var(--text-tertiary); white-space: nowrap; }

    .status-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-tertiary);
      vertical-align: middle;
      margin-right: 4px;
    }

    .status-dot.active { background: var(--text-secondary); }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-cell:nth-child(2) { border-right: none; }
      .proj-meta { gap: 0.75rem; }
      .proj-ago { display: none; }
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0 12px;
      border-top: 1px solid var(--border);
      color: var(--text-tertiary);
      font-size: 0.75rem;
      letter-spacing: 0.04em;
    }
    footer a {
      color: var(--text-tertiary);
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="container">

    <header class="fade-up">
      <div class="wordmark">Cadence</div>
      <div class="sub">
        <span id="date-line">code activity</span>
        <span class="streak-badge" id="streak-badge">-- day streak</span>
      </div>
    </header>

    <section class="fade-up" style="transition-delay:0.05s">
      <span class="section-label">Stats</span>
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-num" id="stat-total">--</div>
          <div class="stat-label">Commits 30d</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num" id="stat-projects">--</div>
          <div class="stat-label">Repos</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num" id="stat-best">--</div>
          <div class="stat-label">Best Day</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num" id="stat-streak">--</div>
          <div class="stat-label">Streak</div>
        </div>
      </div>
    </section>

    <section class="fade-up" style="transition-delay:0.1s">
      <span class="section-label">Commit Activity</span>
      <div class="chart-wrap">
        <canvas id="commitChart"></canvas>
      </div>
    </section>

    <section class="fade-up" style="transition-delay:0.15s">
      <span class="section-label">Activity Grid</span>
      <div class="heatmap-wrap">
        <div class="heatmap" id="heatmap"></div>
      </div>
    </section>

    <section class="fade-up" style="transition-delay:0.2s">
      <span class="section-label">Projects</span>
      <ul class="proj-list" id="proj-list"></ul>
    </section>

    <footer>
      <span>MIT 2026 Joshua Trommel</span>
      <a href="https://github.com/nulljosh/cadence" target="_blank" rel="noopener">GitHub</a>
    </footer>

  </div>

  <script>
    const API = '';

    // FadeUp observer
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));

    function mk(tag, cls, text) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      if (text !== undefined) e.textContent = text;
      return e;
    }

    function fmtNum(n) { return n.toLocaleString(); }

    async function load() {
      const [stats, heatmap, projects] = await Promise.all([
        fetch(API+'/api/stats').then(r=>r.json()),
        fetch(API+'/api/heatmap').then(r=>r.json()),
        fetch(API+'/api/projects').then(r=>r.json()),
      ]);

      // Date line
      const now = new Date();
      document.getElementById('date-line').textContent =
        now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toLowerCase();

      // Stats
      document.getElementById('stat-total').textContent = fmtNum(stats.total30);
      document.getElementById('stat-projects').textContent = stats.activeProjects;
      document.getElementById('stat-best').textContent = stats.bestDay;
      document.getElementById('stat-streak').textContent = stats.streak;
      document.getElementById('streak-badge').textContent = stats.streak + '-day streak';

      // Chart
      const labels = [], data = [];
      for (let i = 29; i >= 0; i--) {
        const d = new Date(now); d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        labels.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
        data.push(stats.daily[key] || 0);
      }
      new Chart(document.getElementById('commitChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: 'rgba(232,232,232,0.12)',
            borderColor: 'rgba(232,232,232,0.35)',
            borderWidth: 1,
            borderRadius: 3,
            hoverBackgroundColor: 'rgba(232,232,232,0.25)'
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#222',
              borderColor: 'rgba(232,232,232,0.1)',
              borderWidth: 1,
              titleColor: 'rgba(232,232,232,0.4)',
              bodyColor: '#e8e8e8',
              callbacks: { label: ctx => ' ' + ctx.raw + ' commits' }
            }
          },
          scales: {
            x: { grid: { color: 'rgba(232,232,232,0.04)' }, ticks: { color: 'rgba(232,232,232,0.25)', font: { size: 10, family: 'Geist' }, maxTicksLimit: 8 } },
            y: { grid: { color: 'rgba(232,232,232,0.04)' }, ticks: { color: 'rgba(232,232,232,0.25)', font: { size: 10, family: 'Geist' } } }
          }
        }
      });

      // Heatmap
      const hm = document.getElementById('heatmap');
      const max = Math.max(...Object.values(heatmap), 1);
      for (let i = 364; i >= 0; i--) {
        const d = new Date(now); d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        const count = heatmap[key] || 0;
        const ratio = count / max;
        const level = count === 0 ? '' : ratio < 0.25 ? 'l1' : ratio < 0.5 ? 'l2' : ratio < 0.75 ? 'l3' : 'l4';
        const cell = mk('div', 'heatmap-cell' + (level ? ' ' + level : ''));
        cell.title = key + ': ' + count + ' commits';
        hm.appendChild(cell);
      }

      // Projects
      const list = document.getElementById('proj-list');
      projects.forEach(p => {
        const li = mk('li', 'proj-row');
        const name = mk('span', 'proj-name', p.name);
        const meta = mk('div', 'proj-meta');
        const dot = mk('span', 'status-dot' + (p.status === 'active' ? ' active' : ''));
        const commits = mk('span', 'proj-commits', String(p.commits30));
        const ago = mk('span', 'proj-ago', p.lastCommitAgo);
        meta.appendChild(dot);
        meta.appendChild(commits);
        meta.appendChild(ago);
        li.appendChild(name);
        li.appendChild(meta);
        list.appendChild(li);
      });
    }

    load();
  </script>
</body>
</html>
