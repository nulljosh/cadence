<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif">
  <rect width="800" height="400" fill="#fff"/>

  <!-- Git Repos -->
  <rect x="40" y="160" width="140" height="80" rx="8" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <text x="110" y="196" text-anchor="middle" font-size="12" font-weight="600" fill="#000">Git Repos</text>
  <text x="110" y="214" text-anchor="middle" font-size="10" fill="#888">~/Documents/Code/</text>
  <text x="110" y="230" text-anchor="middle" font-size="10" fill="#888">git log --format=%ad</text>

  <!-- Arrow -->
  <line x1="180" y1="200" x2="240" y2="200" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="240,196 248,200 240,204" fill="#ccc"/>

  <!-- API Server -->
  <rect x="248" y="140" width="160" height="120" rx="8" fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="328" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#000">API Server</text>
  <text x="328" y="190" text-anchor="middle" font-size="10" fill="#888">Node / Express :3001</text>
  <line x1="268" y1="200" x2="388" y2="200" stroke="#eee" stroke-width="1"/>
  <text x="328" y="216" text-anchor="middle" font-size="10" fill="#555">/api/stats</text>
  <text x="328" y="230" text-anchor="middle" font-size="10" fill="#555">/api/heatmap</text>
  <text x="328" y="244" text-anchor="middle" font-size="10" fill="#555">/api/projects</text>

  <!-- Arrow to Web -->
  <line x1="408" y1="180" x2="460" y2="140" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="456,134 464,138 458,145" fill="#ccc"/>

  <!-- Arrow to iOS -->
  <line x1="408" y1="200" x2="460" y2="200" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="460,196 468,200 460,204" fill="#ccc"/>

  <!-- Arrow to macOS -->
  <line x1="408" y1="220" x2="460" y2="260" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="456,255 464,262 458,268" fill="#ccc"/>

  <!-- Web -->
  <rect x="468" y="80" width="140" height="72" rx="8" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <text x="538" y="112" text-anchor="middle" font-size="12" font-weight="600" fill="#000">Web</text>
  <text x="538" y="130" text-anchor="middle" font-size="10" fill="#888">index.html</text>
  <text x="538" y="146" text-anchor="middle" font-size="10" fill="#888">Chart.js + Heatmap</text>

  <!-- iOS -->
  <rect x="468" y="164" width="140" height="72" rx="8" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <text x="538" y="196" text-anchor="middle" font-size="12" font-weight="600" fill="#000">iOS</text>
  <text x="538" y="214" text-anchor="middle" font-size="10" fill="#888">SwiftUI + Swift Charts</text>
  <text x="538" y="230" text-anchor="middle" font-size="10" fill="#888">NetworkManager</text>

  <!-- macOS -->
  <rect x="468" y="248" width="140" height="72" rx="8" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <text x="538" y="280" text-anchor="middle" font-size="12" font-weight="600" fill="#000">macOS</text>
  <text x="538" y="298" text-anchor="middle" font-size="10" fill="#888">SwiftUI + Swift Charts</text>
  <text x="538" y="314" text-anchor="middle" font-size="10" fill="#888">Shared Models</text>

  <!-- Vercel -->
  <rect x="648" y="80" width="120" height="56" rx="8" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="708" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="#aaa">Vercel</text>
  <text x="708" y="126" text-anchor="middle" font-size="10" fill="#bbb">cadence.heyitsmejosh.com</text>
  <line x1="608" y1="116" x2="648" y2="116" stroke="#ddd" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="16" font-weight="600" fill="#000">Cadence</text>
  <text x="400" y="56" text-anchor="middle" font-size="11" fill="#aaa">code activity tracker</text>
</svg>
