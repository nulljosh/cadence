name: Cadence
options:
  bundleIdPrefix: com.nulljosh
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Cadence-iOS:
    type: application
    platform: iOS
    bundleId: com.nulljosh.cadence
    sources:
      - path: Sources
    settings:
      base:
        INFOPLIST_FILE: Sources/iOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.cadence
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - sdk: Charts.framework

  Cadence-macOS:
    type: application
    platform: macOS
    bundleId: com.nulljosh.cadence.mac
    sources:
      - path: Sources
    settings:
      base:
        INFOPLIST_FILE: Sources/macOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.nulljosh.cadence.mac
    dependencies:
      - sdk: Charts.framework
